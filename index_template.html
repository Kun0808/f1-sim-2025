<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>F1 职业生涯模拟器</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏎️</text></svg>">
</head>
<body>
  <div id="app">
    <!-- 开始画面 -->
    <div id="start-screen" class="screen active"></div>

    <!-- 背景选择 -->
    <div id="background-screen" class="screen"></div>

    <!-- 主界面 -->
    <div id="hub-screen" class="screen"></div>

    <!-- 训练 -->
    <div id="training-screen" class="screen"></div>

    <!-- 车手档案 -->
    <div id="driver-screen" class="screen"></div>

    <!-- 积分榜 -->
    <div id="standings-screen" class="screen"></div>

    <!-- 赛历 -->
    <div id="calendar-screen" class="screen"></div>

    <!-- 成就 -->
    <div id="achievements-screen" class="screen"></div>

    <!-- 赞助商 -->
    <div id="sponsor-screen" class="screen"></div>

    <!-- 比赛画面 -->
    <div id="race-screen" class="screen"></div>

    <!-- 赛季结束 -->
    <div id="season-end-screen" class="screen"></div>

    <!-- 合同谈判 -->
    <div id="contract-screen" class="screen"></div>
  </div>

  <script src="game.js?v=3"></script>
</body>
</html>
